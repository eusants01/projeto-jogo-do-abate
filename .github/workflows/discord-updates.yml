name: Familia Sants Deploy Logs

on:
  push:
    branches:
      - main

jobs:
  discord-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Premium Discord Deploy Log
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AUTHOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMPARE_URL: ${{ github.event.compare }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python3 <<'PY'
          import os
          import json
          import subprocess
          from datetime import datetime, timezone

          webhook_url = os.getenv("WEBHOOK_URL")
          author = os.getenv("AUTHOR", "Desconhecido")
          repository = os.getenv("REPOSITORY", "Desconhecido")
          branch = os.getenv("BRANCH", "main")
          commit_url = os.getenv("COMMIT_URL", "")
          compare_url = os.getenv("COMPARE_URL", "")
          commit_message = os.getenv("COMMIT_MESSAGE", "Sem mensagem")

          github_event_path = os.getenv("GITHUB_EVENT_PATH")
          commit_count = "1"

          if github_event_path:
              try:
                  with open(github_event_path, "r", encoding="utf-8") as f:
                      event = json.load(f)
                  commit_count = str(len(event.get("commits", [])))
              except Exception:
                  commit_count = "1"

          payload = {
              "username": "Família Sant's • Deploy System",
              "avatar_url": "https://cdn-icons-png.flaticon.com/512/906/906324.png",
              "embeds": [
                  {
                      "title": "🚀 Nova atualização publicada",
                      "description": "```ansi\n\u001b[2;31m[SISTEMA]\u001b[0m Novo deploy enviado para produção.\n\u001b[2;37m[STATUS]\u001b[0m Repositório sincronizado com sucesso.\n```",
                      "color": 13369344,
                      "fields": [
                          {
                              "name": "📌 Commit",
                              "value": f"```fix\n{commit_message}\n```",
                              "inline": False
                          },
                          {
                              "name": "👤 Desenvolvedor",
                              "value": f"`@{author}`",
                              "inline": True
                          },
                          {
                              "name": "🌿 Branch",
                              "value": f"`{branch}`",
                              "inline": True
                          },
                          {
                              "name": "📦 Repositório",
                              "value": f"`{repository}`",
                              "inline": True
                          },
                          {
                              "name": "📊 Push",
                              "value": f"`{commit_count} commit(s) enviado(s)`",
                              "inline": True
                          },
                          {
                              "name": "🔗 Commit",
                              "value": f"[Visualizar Commit]({commit_url})",
                              "inline": True
                          },
                          {
                              "name": "🧩 Comparação",
                              "value": f"[Ver Alterações]({compare_url})",
                              "inline": True
                          }
                      ],
                      "image": {
                          "url": "https://cdn.discordapp.com/attachments/961677475191078992/1507497497013129386/ChatGPT_Image_22_de_mai._de_2026_18_36_44.png"
                      },
                      "thumbnail": {
                          "url": "https://cdn.discordapp.com/attachments/961677475191078992/1507497033555247135/imagem_2026-05-22_183429089-removebg-preview.png"
                      },
                      "footer": {
                          "text": "Família Sant's • Devil Cassino"
                      },
                      "timestamp": datetime.now(timezone.utc).isoformat()
                  }
              ]
          }

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)

          subprocess.run([
              "curl",
              "-H", "Content-Type: application/json",
              "-X", "POST",
              "-d", "@payload.json",
              webhook_url
          ], check=True)
          PY